hybrid_model:
  formal_layer: Machine-readable, constrained ontology for reproducible analysis.
  interpretive_layer: Human-readable labels and descriptions for public exploration.
  explicit_notice: 'This project uses a hybrid ontology: rigorous structured data
    underneath, accessible exploratory language on top.'
scope_rule:
  included: terminal emulators
  excluded:
  - multiplexers
  - shells
  - embedded IDE terminals
  - wrappers that do not function as terminal emulators in their own right
confidence_levels:
  high: Verified or strongly supported by primary/reliable sources.
  medium: Supported by multiple signals but not fully primary-source verified.
  inferred: Deduced from context, lineage, or implementation signals.
  low: Uncertain, incomplete, or weakly supported classification.
category_derivation:
  GPU_modern:
    rendering_generation: gpu_modern
    ecosystem: standalone
    era: modern
  VTE_ecosystem:
    rendering_generation: cpu_classic
    ecosystem: vte
    era: modern
  X11_legacy:
    rendering_generation: cpu_classic
    ecosystem: x11_xterm_family
    era: legacy
  Experimental_UI:
    rendering_generation: mixed_or_experimental
    ecosystem: experimental_ui
    era: modern
  Qt_ecosystem:
    rendering_generation: cpu_classic
    ecosystem: qt_kde
    era: modern
